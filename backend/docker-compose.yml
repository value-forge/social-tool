version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: social-tool-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: social_tool
    volumes:
      - mongo_data:/data/db
    networks:
      - social-tool

volumes:
  mongo_data:

networks:
  social-tool:
    driver: bridge
