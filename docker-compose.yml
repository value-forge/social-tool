version: "3.8"

# MongoDB 连接串（与本文件 MONGO_INITDB_* 一致）：
#   mongodb://root:social_tool_dev@127.0.0.1:27017/social_tool?authSource=admin&directConnection=true
# 若你实际是用 backend/docker-compose.yml 启动的，凭据为 admin/password（见该文件注释）。

services:
  mongodb:
    image: mongo:7
    container_name: social-tool-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: social_tool_dev
      MONGO_INITDB_DATABASE: social_tool
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: social-tool-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass social_tool_dev
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
